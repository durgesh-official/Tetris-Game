<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Tetris - Hard Drop</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body {
            background: #0a0a0a;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            min-height: 100vh;
            overflow: hidden;
        }

        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 360px;
            padding: 10px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding: 10px;
            background: #1a1a1a;
            border: 2px solid #333;
            margin-bottom: 10px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
        }

        .stat-box { text-align: center; }
        .stat-label { font-size: 10px; color: #888; text-transform: uppercase; }
        .stat-value { font-size: 20px; font-weight: bold; text-shadow: 0 0 5px #0f0; }

        canvas {
            background-color: #000;
            border: 4px solid #333;
            max-width: 230px;
            height: auto;
            image-rendering: pixelated;
        }

        /* कंट्रोल बटन्स */
        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            margin-top: 15px;
        }

        .btn {
            background: #222;
            border: 2px solid #444;
            color: #0f0;
            padding: 18px 0;
            font-size: 22px;
            border-radius: 12px;
            cursor: pointer;
            user-select: none;
            transition: 0.1s;
        }

        .btn:active { background: #0f0; color: #000; transform: scale(0.9); }
        
        .btn-rotate { background: #0055ff; color: white; grid-column: span 3; border-color: #0077ff; }
        .btn-drop { background: #ff5500; color: white; border-color: #ff7700; font-weight: bold; }

        /* ओवरले */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        h1 { font-size: 40px; margin: 0; text-shadow: 0 0 20px #0f0; }
        
        #start-btn {
            padding: 15px 50px;
            font-size: 24px;
            background: #0f0;
            color: #000;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }

        .hint { color: #555; margin-top: 20px; font-size: 12px; text-align: center; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>TETRIS</h1>
        <p id="msg" style="color: #0f0;">READY?</p>
        <button id="start-btn">START</button>
        <div class="hint">PC: Arrows (Down = Hard Drop)<br>Mobile: Use Buttons</div>
    </div>

    <div id="game-container">
        <div class="header">
            <div class="stat-box">
                <div class="stat-label">Score</div>
                <div id="score" class="stat-value">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Lines</div>
                <div id="lines" class="stat-value">0</div>
            </div>
        </div>

        <canvas id="tetris" width="240" height="400"></canvas>

        <div class="controls">
            <button class="btn btn-rotate" id="ctrl-up">ROTATE</button>
            <button class="btn" id="ctrl-left">←</button>
            <button class="btn btn-drop" id="ctrl-down">DROP</button>
            <button class="btn" id="ctrl-right">→</button>
        </div>
    </div>

<script>
    // --- AUDIO (Retro Music Generator) ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let melodyInterval;

    function playNote(freq, duration, type='square', volume=0.1) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(volume, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    const theme = [
        [659,4],[493,8],[523,8],[587,4],[523,8],[493,8],[440,4],[440,8],[523,8],[659,4],[587,8],[523,8],[493,3]
    ];

    function startMusic() {
        let i = 0;
        melodyInterval = setInterval(() => {
            playNote(theme[i][0], 0.5);
            i = (i + 1) % theme.length;
        }, 300);
    }

    // --- GAME LOGIC ---
    const canvas = document.getElementById('tetris');
    const context = canvas.getContext('2d');
    context.scale(20, 20);

    const colors = [null, '#FF0D72', '#0DC2FF', '#0DFF72', '#F538FF', '#FF8E0D', '#FFE138', '#3877FF'];

    function createMatrix(w, h) {
        return Array.from({length: h}, () => new Array(w).fill(0));
    }

    function createPiece(type) {
        if (type === 'I') return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]];
        if (type === 'L') return [[0,2,0],[0,2,0],[0,2,2]];
        if (type === 'J') return [[0,3,0],[0,3,0],[3,3,0]];
        if (type === 'O') return [[4,4],[4,4]];
        if (type === 'Z') return [[5,5,0],[0,5,5],[0,0,0]];
        if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
        if (type === 'T') return [[0,7,0],[7,7,7],[0,0,0]];
    }

    function collide(arena, player) {
        const [m, o] = [player.matrix, player.pos];
        for (let y = 0; y < m.length; ++y) {
            for (let x = 0; x < m[y].length; ++x) {
                if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
            }
        }
        return false;
    }

    function merge(arena, player) {
        player.matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
            });
        });
    }

    function arenaSweep() {
        outer: for (let y = arena.length - 1; y > 0; --y) {
            for (let x = 0; x < arena[y].length; ++x) {
                if (arena[y][x] === 0) continue outer;
            }
            const row = arena.splice(y, 1)[0].fill(0);
            arena.unshift(row);
            player.score += 10;
            player.lines += 1;
            playNote(150, 0.2, 'triangle', 0.3);
        }
        updateScore();
    }

    function rotate(matrix, dir) {
        for (let y = 0; y < matrix.length; ++y) {
            for (let x = 0; x < y; ++x) { [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]]; }
        }
        if (dir > 0) matrix.forEach(row => row.reverse()); else matrix.reverse();
    }

    // --- HARD DROP FUNCTION ---
    function playerHardDrop() {
        while (!collide(arena, player)) {
            player.pos.y++;
        }
        player.pos.y--; // टकराने से ठीक पहले वाली पोजीशन
        merge(arena, player);
        playNote(100, 0.05, 'sine', 0.2); // ड्रॉप साउंड
        playerReset();
        arenaSweep();
        dropCounter = 0;
    }

    function playerMove(dir) {
        player.pos.x += dir;
        if (collide(arena, player)) player.pos.x -= dir;
    }

    function playerRotate(dir) {
        const pos = player.pos.x;
        let offset = 1;
        rotate(player.matrix, dir);
        while (collide(arena, player)) {
            player.pos.x += offset;
            offset = -(offset + (offset > 0 ? 1 : -1));
            if (offset > player.matrix[0].length) {
                rotate(player.matrix, -dir);
                player.pos.x = pos;
                return;
            }
        }
    }

    function playerReset() {
        const pieces = 'ILJOTSZ';
        player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
        player.pos.y = 0;
        player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
        if (collide(arena, player)) {
            arena.forEach(row => row.fill(0));
            document.getElementById('msg').innerText = "GAME OVER";
            document.getElementById('overlay').style.display = 'flex';
            clearInterval(melodyInterval);
            isPaused = true;
        }
    }

    function updateScore() {
        document.getElementById('score').innerText = player.score;
        document.getElementById('lines').innerText = player.lines;
    }

    function draw() {
        context.fillStyle = '#000';
        context.fillRect(0, 0, canvas.width, canvas.height);
        drawMatrix(arena, {x: 0, y: 0});
        drawMatrix(player.matrix, player.pos);
    }

    function drawMatrix(matrix, offset) {
        matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    context.fillStyle = colors[value];
                    context.fillRect(x + offset.x, y + offset.y, 1, 1);
                    context.strokeStyle = '#000';
                    context.lineWidth = 0.05;
                    context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                }
            });
        });
    }

    let dropCounter = 0;
    let dropInterval = 1000;
    let lastTime = 0;
    let isPaused = true;

    function update(time = 0) {
        if (isPaused) return;
        const deltaTime = time - lastTime;
        lastTime = time;
        dropCounter += deltaTime;
        if (dropCounter > dropInterval) {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
            }
            dropCounter = 0;
        }
        draw();
        requestAnimationFrame(update);
    }

    const arena = createMatrix(12, 20);
    const player = { pos: {x: 0, y: 0}, matrix: null, score: 0, lines: 0 };

    // Controls
    document.addEventListener('keydown', event => {
        if (event.keyCode === 37) playerMove(-1); // Left
        if (event.keyCode === 39) playerMove(1);  // Right
        if (event.keyCode === 40) playerHardDrop(); // Down (Hard Drop)
        if (event.keyCode === 38) playerRotate(1); // Up (Rotate)
    });

    document.getElementById('ctrl-left').onclick = () => playerMove(-1);
    document.getElementById('ctrl-right').onclick = () => playerMove(1);
    document.getElementById('ctrl-down').onclick = () => playerHardDrop();
    document.getElementById('ctrl-up').onclick = () => playerRotate(1);

    document.getElementById('start-btn').onclick = () => {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        document.getElementById('overlay').style.display = 'none';
        isPaused = false;
        player.score = 0;
        player.lines = 0;
        updateScore();
        playerReset();
        startMusic();
        update();
    };
</script>
</body>
</html>
